    title: Moving-average crossover proxy for own-return trend persistence
    source_refs: [SRC-TSMOM-MOP2012]
    expected_strategy_id: STRAT-B2-ma-crossover
    expected_spec_sha256: c79cf7b9d635feb8d7d6d5db88713aad2f47028d247362b811aed2742f103f06
    semantic_transformation: >-
      Transform the paper's diversified, monthly time-series-momentum construction into a
      long-only 5-minute BTCUSDT rule that enters when SMA(3) exceeds SMA(5) and exits when
      SMA(3) falls below SMA(5), then sweep alternate fast/slow windows.
    proxy_notes:
      - This is a simplified executable proxy, not a faithful paper reproduction.
      - It omits the paper's asset universe, return-sign formation horizon, volatility scaling, short positions, and portfolio aggregation.
      - The citation motivates only an own-past-return trend hypothesis; it supplies no inherited profitability proof for this crossover.
    target_market: crypto_spot
    target_instrument: BTCUSDT
    target_timeframe: 5m
    assumptions:
      - Canonical B2 signal and next-bar execution semantics are authoritative for the lab.
      - Parameter sweeps are sensitivity observations and do not select or validate a winner.
    ambiguities:
