# Seed item 5/10 (T-010-06) -- Hummingbot V2 directional-trading controller (supertrend_v1)
strategy_id: STRAT-HB1-supertrend-directional
family: trend_following
inputs: [close, high, low]
indicators:
  - name: supertrend
    parameters: {window: 20, multiplier: 4, source: close, signal_mode: proximity_level, percentage_threshold: 0.01}
    outputs: [supertrend_signal]
entry_long:
  all:
    - supertrend_signal > 0
exit_long:
  any:
    - supertrend_signal < 0
position_sizing: {type: fixed_fraction, fraction: 1.0}
risk: {stop_loss: null, take_profit: null}
assumptions:
  - "signal evaluated at bar close; execution at next bar open (mapped from Hummingbot's per-candle controller update_processed_data / executor-proposal cycle)"
  - "warm-up: no signal until the 20-bar ATR/Supertrend window is seeded (bars 1-19 produce no signal)"
  - "signal is direction level (+1/-1) only while absolute close-to-Supertrend distance is below 1%; otherwise 0, matching the cited controller"
ambiguities:
  - "pandas_ta implementation details remain an external dependency; this spec captures the controller's explicit direction-level plus proximity-threshold conditions"
  - "Hummingbot V2 directional-trading controllers configure a triple-barrier (stop-loss/take-profit/trailing-stop/time-limit) at the controller-config level, separate from the pandas_ta signal itself; this canonical spec captures only the signal rule, not the triple-barrier -- a real semantic gap between this project's single stop_loss/take_profit fields and Hummingbot's richer executor-level risk config"
source_refs: [SRC-HB1]
license_ref: LIC-HB1
